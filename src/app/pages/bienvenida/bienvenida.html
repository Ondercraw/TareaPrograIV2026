<section class="page-container welcome-container">
  <div class="welcome-header">
    <h1 class="neon-text">APP DE TAREAS</h1>
    <p class="welcome-subtitle">Programacion IV</p>
  </div>

  <div class="cards-grid">
    <div *ngFor="let card of cards">
      <app-card
        [titulo]="card.titulo"
        [subtitulo]="card.subtitulo"
        [imagen]="card.imagen"
        [link]="card.link">
      </app-card>
    </div>
  </div>
</section>
