<article class="neon-card app-card">
  <img [src]="imagen" class="card-img-top" [alt]="titulo">
  <div class="card-content">
    <h3>{{ titulo }}</h3>
    <p>{{ subtitulo }}</p>
    <a class="nav-btn card-link" [href]="link" target="_blank" rel="noopener noreferrer">
      Ver mas
    </a>
  </div>
</article>
